<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="win" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2235"/>
      <stop offset="100%" stop-color="#161929"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="16" y="16" width="368" height="268" rx="12" fill="url(#win)" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="16" y="16" width="368" height="44" rx="12" fill="#252a3d"/>
  <rect x="16" y="42" width="368" height="18" fill="#252a3d"/>

  <!-- Traffic lights -->
  <circle cx="44" cy="38" r="8" fill="#ff5f57"/>
  <circle cx="68" cy="38" r="8" fill="#febc2e"/>
  <circle cx="92" cy="38" r="8" fill="#28c840"/>

  <!-- Title -->
  <text x="200" y="44" text-anchor="middle"
        font-family="ui-monospace,monospace" font-size="15" fill="rgba(255,255,255,0.4)">mcp-agent</text>

  <!-- Divider -->
  <line x1="16" y1="60" x2="384" y2="60" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Prompt line -->
  <text x="36" y="115" font-family="ui-monospace,monospace" font-size="26" fill="rgba(255,255,255,0.3)">$</text>
  <text x="60" y="115" font-family="ui-monospace,monospace" font-size="26" fill="rgba(255,255,255,0.9)">fastmcp run</text>

  <!-- Output line 1 -->
  <text x="36" y="158" font-family="ui-monospace,monospace" font-size="22" fill="#4ade80">✓</text>
  <text x="64" y="158" font-family="ui-monospace,monospace" font-size="22" fill="rgba(255,255,255,0.6)">8 tools · 10 users</text>

  <!-- Output line 2 -->
  <text x="36" y="200" font-family="ui-monospace,monospace" font-size="22" fill="#4ade80">✓</text>
  <text x="64" y="200" font-family="ui-monospace,monospace" font-size="22" fill="rgba(255,255,255,0.6)">Cursor · Claude</text>

  <!-- Cursor blink -->
  <rect x="36" y="222" width="14" height="22" rx="2" fill="rgba(255,255,255,0.5)"/>
</svg>
