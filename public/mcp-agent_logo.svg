<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="14"/>

  <!-- Center glow -->
  <ellipse cx="200" cy="148" rx="110" ry="90" fill="url(#glowBg)"/>

  <!-- Grid lines -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="66" y1="0" x2="66" y2="300"/><line x1="133" y1="0" x2="133" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/><line x1="267" y1="0" x2="267" y2="300"/>
    <line x1="334" y1="0" x2="334" y2="300"/>
  </g>

  <!-- Connection lines with animated dots -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-dasharray="5,4">
    <line x1="200" y1="148" x2="80" y2="72"/>
    <line x1="200" y1="148" x2="320" y2="72"/>
    <line x1="200" y1="148" x2="80" y2="224"/>
    <line x1="200" y1="148" x2="320" y2="224"/>
  </g>
  <!-- Dot markers on lines -->
  <g fill="#60a5fa" opacity="0.7" filter="url(#nodeGlow)">
    <circle cx="140" cy="110" r="3"/>
    <circle cx="260" cy="110" r="3"/>
    <circle cx="140" cy="186" r="3"/>
    <circle cx="260" cy="186" r="3"/>
  </g>

  <!-- ── Satellite nodes ── -->

  <!-- Git (top-left) -->
  <circle cx="80" cy="72" r="36" fill="#111d35" stroke="#3b82f6" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <circle cx="80" cy="72" r="33" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <!-- Git icon (branch) -->
  <g transform="translate(80,72)">
    <circle cx="-9" cy="-10" r="5" fill="#60a5fa"/>
    <circle cx="-9" cy="10" r="5" fill="#60a5fa"/>
    <circle cx="9" cy="-3" r="5" fill="#60a5fa"/>
    <line x1="-9" y1="-5" x2="-9" y2="5" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -9 -5 Q -9 -13 0 -13 Q 9 -13 9 -8" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="80" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#93c5fd" letter-spacing="0.5">Git</text>

  <!-- Calendar (top-right) -->
  <circle cx="320" cy="72" r="36" fill="#111d35" stroke="#3b82f6" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <circle cx="320" cy="72" r="33" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <!-- Calendar icon -->
  <g transform="translate(320,72)">
    <rect x="-13" y="-11" width="26" height="22" rx="3" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="-13" y1="-3" x2="13" y2="-3" stroke="#60a5fa" stroke-width="2"/>
    <line x1="-6" y1="-15" x2="-6" y2="-7" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-15" x2="6" y2="-7" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-8" y="2" width="5" height="4" rx="1" fill="#60a5fa"/>
    <rect x="3" y="2" width="5" height="4" rx="1" fill="#60a5fa"/>
  </g>
  <text x="320" y="118" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#93c5fd" letter-spacing="0.5">Calendar</text>

  <!-- HRWeb (bottom-left) -->
  <circle cx="80" cy="224" r="36" fill="#111d35" stroke="#3b82f6" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <circle cx="80" cy="224" r="33" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <!-- Person icon -->
  <g transform="translate(80,224)">
    <circle cx="0" cy="-10" r="7" fill="#60a5fa"/>
    <path d="M -12 11 C -12 2 12 2 12 11 Z" fill="#60a5fa"/>
  </g>
  <text x="80" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#93c5fd" letter-spacing="0.5">HRWeb</text>

  <!-- Claude Desktop (bottom-right) -->
  <circle cx="320" cy="224" r="36" fill="#111d35" stroke="#3b82f6" stroke-width="1.5" filter="url(#nodeGlow)"/>
  <circle cx="320" cy="224" r="33" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <!-- Terminal icon -->
  <g transform="translate(320,224)" fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-14" y="-11" width="28" height="22" rx="3.5"/>
    <polyline points="-9,-3.5 -3,1.5 -9,6.5" stroke="#93c5fd"/>
    <line x1="-1" y1="6.5" x2="9" y2="6.5" stroke="#93c5fd"/>
  </g>
  <text x="320" y="270" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="600" fill="#93c5fd" letter-spacing="0.5">Cursor</text>

  <!-- ── Center (MCP Agent) ── -->
  <circle cx="200" cy="148" r="50" fill="url(#centerGrad)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="200" cy="148" r="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Bot icon (larger, clearer) -->
  <g transform="translate(200,148)">
    <!-- Head -->
    <rect x="-17" y="-17" width="34" height="28" rx="6" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.7)" stroke-width="1.8"/>
    <!-- Eyes -->
    <rect x="-10" y="-10" width="7" height="7" rx="2" fill="white"/>
    <rect x="3" y="-10" width="7" height="7" rx="2" fill="white"/>
    <!-- Signal/mouth bars -->
    <rect x="-8" y="2" width="3.5" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
    <rect x="-2" y="0" width="3.5" height="7" rx="1" fill="rgba(255,255,255,0.75)"/>
    <rect x="4" y="-1.5" width="3.5" height="8.5" rx="1" fill="white"/>
    <!-- Antenna -->
    <line x1="0" y1="-17" x2="0" y2="-24" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-27" r="3.5" fill="white" filter="url(#nodeGlow)"/>
  </g>

  <!-- MCP label -->
  <text x="200" y="212" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="3">MCP AGENT</text>
</svg>
